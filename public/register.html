<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro | Elegance Store</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: #fcf9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
    .auth-card h2 { color: #5a3e49; margin-bottom: 20px; }
  </style>
</head>
<body>

  <div class="auth-card">
    <h2>Criar nova conta</h2>

    <form id="registerForm" class="product-form">

      <div class="campo-form">
        <label>Nome completo</label>
        <input type="text" id="name" required />
      </div>

      <div class="campo-form">
        <label>E-mail</label>
        <input type="email" id="email" required />
      </div>

      <div class="campo-form" style="position: relative;">
        <label>Senha</label>

        <input type="password" id="password" required style="padding-right: 40px;" />

        <!-- BOTÃO CORRETO -->
        <button type="button" id="togglePassword" 
          style="position: absolute; right: 10px; top: 38px; background: none; border: none; cursor: pointer; color: #666;">
          
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>

      </div>

      <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Cadastrar</button>

      <div id="registerMessage" style="margin-top: 10px;"></div>

    </form>

    <p>Já tem conta? <a href="/login.html">Login</a></p>
  </div>

  <script src="register.js"></script>
</body>
</html>
