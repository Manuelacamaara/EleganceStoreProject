<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Elegance Store</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: #fcf9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
    .auth-card h2 { color: #5a3e49; margin-bottom: 20px; }
    .auth-card p { color: #666; margin-top: 15px; font-size: 0.9rem; }
    .auth-card a { color: #5a3e49; font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>

  <div class="auth-card">
    <h2>Acessar conta</h2>

    <form id="loginForm" class="product-form">
      
      <div class="campo-form">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required />
      </div>
      
      <div class="campo-form" style="position: relative;">
        <label for="password">Senha</label>

        <input type="password" id="password" placeholder="••••••••" required style="padding-right: 40px;" />

        <!-- BOTÃO CORRETO -->
        <button type="button" id="togglePassword" 
          style="position: absolute; right: 10px; top: 38px; background: none; border: none; cursor: pointer; color: #666;">
          
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>

      </div>

      <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Entrar</button>
      <div id="message" class="form-message" style="margin-top: 10px; font-weight: bold;"></div>

    </form>

    <p>Ainda não tem conta? <a href="/register.html">Cadastre-se</a></p>
  </div>

  <script src="login.js"></script>
</body>
</html>
